services:
  db:
    image: postgres:15-alpine
    container_name: pocket-mini-db-dev
    restart: no
    environment:
      POSTGRES_USER: ${DB_USERNAME:-pocket-mini}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-pocket-mini}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    container_name: pocket-mini-backend-dev
    restart: no
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-pocket-mini}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-pocket-mini}
      JWT_SECRET: ${JWT_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "4000:4000"
    volumes:
      - ./Backend:/app
      - /app/node_modules # Anonymous volume to protect container node_modules
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pocket-mini-frontend-dev
    restart: no
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume
      - /app/.next       # Anonymous volume
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data_dev:
